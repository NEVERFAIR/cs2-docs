site_name: Neverfair Lua API
site_description: Neverfair LuaJIT scripting documentation
site_url: https://neverfair.github.io/cs2-docs/

theme:
  name: material
  logo: assets/avatar.png
  favicon: assets/avatar.png
  palette:
    scheme: slate
    primary: deep purple
    accent: cyan
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - LuaJIT: luajit.md
  - environment: environment.md
  - engine: engine.md
  - entitylist: entitylist.md
  - render: render.md
  - menu: menu.md
  - globals: globals.md
  - events: events.md
  - cvars: cvars.md
  - netvars: netvars.md
  - types: types.md
  - examples:
    - Clantag based on weapon name: examples/weapon-name.md
    - HUD + hitlog: examples/hud-hitlog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
